<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Badhra PMTiles Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
    container: "map",
    center: [75.958, 28.506],
    zoom: 10,

    style: {
        version: 8,

        sources: {

            osm: {
                type: "raster",
                tiles: [
                    "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
                ],
                tileSize: 256
            },

            badhra: {
                type: "vector",
                url: "pmtiles://https://28sharmaji1702-lgtm.github.io/BADHRA.MAP/badhra.pmtiles"
            }

        },

        layers: [

            {
                id: "osm",
                type: "raster",
                source: "osm"
            },

            {
                id: "fill",
                type: "fill",
                source: "badhra",
                "source-layer": "BADHRA — badhra_standard_merged",
                paint: {
                    "fill-color": "#0080ff",
                    "fill-opacity": 0.35
                }
            },

            {
                id: "outline",
                type: "line",
                source: "badhra",
                "source-layer": "BADHRA — badhra_standard_merged",
                paint: {
                    "line-color": "#000000",
                    "line-width": 1
                }
            },

            {
                id: "labels",
                type: "symbol",
                source: "badhra",
                "source-layer": "BADHRA — badhra_standard_merged",

                layout: {

                    "text-field": [
                        "coalesce",
                        ["get","Name"],
                        ["get","name"],
                        ["get","LABEL"],
                        ["get","label"],
                        ["get","Village"],
                        ["get","village"],
                        ["get","PlotNo"],
                        ["get","plotno"],
                        ["get","Khasra"],
                        ["get","khasra"]
                    ],

                    "text-font": [
                        "Open Sans Regular"
                    ],

                    "text-size": [
                        "interpolate",
                        ["linear"],
                        ["zoom"],
                        10,10,
                        12,12,
                        14,14,
                        16,16,
                        18,18
                    ],

                    "text-anchor":"center",
                    "text-allow-overlap":false
                },

                paint:{
                    "text-color":"#000000",
                    "text-halo-color":"#ffffff",
                    "text-halo-width":2
                }
            }

        ]
    }

});

map.addControl(new maplibregl.NavigationControl());

map.on("error", function(e){
    console.log(e);
});

</script>

</body>
</html>
