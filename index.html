<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Badhra Map</title>

<link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

<style>
html, body, #map {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      badhra: {
        type: "vector",
        url: "pmtiles://badhra.pmtiles"
      }
    },
    layers: [
      {
        id: "plots",
        type: "line",
        source: "badhra",
        "source-layer": "badhra_standard_merged",
        paint: {
          "line-color": "#ff0000",
          "line-width": 1
        }
      }
    ]
  },
  center: [75.95, 28.45],
  zoom: 12
});
</script>

</body>
</html>
