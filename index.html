<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Badhra Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

<style>
html, body, #map {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
    container: "map",
    style: {
        version: 8,
        sources: {
            osm: {
                type: "raster",
                tiles: [
                    "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
                ],
                tileSize: 256
            },
            badhra: {
                type: "vector",
                url: "pmtiles://https://28sharmaji1702-lgtm.github.io/BADHRA.MAP/badhra.pmtiles"
            }
        },
        layers: [
            {
                id: "osm",
                type: "raster",
                source: "osm"
            }
        ]
    },
    center: [76.05, 28.60],
    zoom: 10
});

map.addControl(new maplibregl.NavigationControl());

map.on("load", async () => {
    try {
        const p = new pmtiles.PMTiles(
            "https://28sharmaji1702-lgtm.github.io/BADHRA.MAP/badhra.pmtiles"
        );

        const header = await p.getHeader();
        const metadata = await p.getMetadata();

        console.log("HEADER:", header);
        console.log("METADATA:", metadata);

        alert(
            "Open F12 → Console and send screenshot of HEADER/METADATA"
        );

    } catch (err) {
        console.error(err);
        alert("PMTiles Error: " + err);
    }
});
</script>

</body>
</html>
